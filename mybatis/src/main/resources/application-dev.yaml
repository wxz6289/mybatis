# 开发环境配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mybatis?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:king}
    password: ${DB_PASSWORD:king123}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 2
      min-idle: 1
      max-active: 10
      max-wait: 60000
      pool-prepared-statements: true

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


# 阿里云 OSS：凭据仅允许来自环境变量（勿提交真实 Key）
aliyun:
  oss:
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}

# 文件上传配置
file:
  upload:
    path: ./uploads
    max-size: 10485760  # 10MB
    storage-type: oss  # local-本地存储，oss-阿里云OSS
